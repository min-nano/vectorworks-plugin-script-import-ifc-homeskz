name: Test

on:
  pull_request:
    branches: ["**"]

# 既定では読み取りのみ。カバレッジのアップロードジョブだけに
# code-quality:write を与える（下記 upload-coverage ジョブ参照）
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # テスト実行ジョブは PR の未検証コードを走らせるため書き込み権限を持たせない
    permissions:
      contents: read
    strategy:
      matrix:
        # requires-python (>=3.9) の下限と新しめのバージョンで検証する
        # (Python 3.9 では ifcopenshell は 3.9 対応の最終版 0.8.4.post1 が解決される)
        python-version: ["3.9", "3.11"]

    steps:
      # サプライチェーン対策: アクションはタグではなくコミット SHA で固定する
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          # pip のダウンロード/ホイールキャッシュ (~/.cache/pip) を復元して
          # ifcopenshell 等の大きなバイナリホイールの再取得を省く。
          # 依存は pyproject.toml に定義されるためこれをキーにする。
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: pip install -e ".[test]"

      - name: Verify dependencies
        run: |
          python -c "import ifcopenshell; print(f'ifcopenshell {ifcopenshell.__version__} installed')"
          python -c "import pytest; print(f'pytest {pytest.__version__} installed')"

      # VectorWorks 公式 vs.py スタブをキャッシュし、毎回の外部ダウンロードを省く。
      # スタブは upstream の main から取得するため、キャッシュキーに ISO 週番号を
      # 含めて週次で更新する (キャッシュヒット時はダウンロードをスキップ)。
      - name: Get current ISO week
        id: isoweek
        run: echo "week=$(date -u +%G-%V)" >> "$GITHUB_OUTPUT"

      - name: Cache VectorWorks vs.py stub
        id: cache-vspy
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
        with:
          path: tests/vs.py
          key: vspy-${{ steps.isoweek.outputs.week }}

      - name: Download VectorWorks official vs.py stub
        if: steps.cache-vspy.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/Vectorworks/developer-scripting/main/Python/pages/files/vs.py \
            -o tests/vs.py
          if [ ! -f tests/vs.py ]; then
            echo "Failed to download vs.py"
            exit 1
          fi
          echo "vs.py downloaded successfully"

      # mypy の増分キャッシュ (.mypy_cache) を復元して型検査を高速化する。
      # ソース・設定・Python バージョンが変わったらキーを更新する。
      - name: Cache mypy
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
        with:
          path: .mypy_cache
          key: mypy-${{ matrix.python-version }}-${{ hashFiles('src/**/*.py', 'tests/**/*.py', 'main.py', 'pyproject.toml') }}
          restore-keys: |
            mypy-${{ matrix.python-version }}-

      - name: Run type check (mypy)
        run: mypy

      - name: Run tests with coverage
        # pytest-xdist でテストをコア数ぶんのワーカーに分散して並列実行する
        # (-n auto)。--dist loadscope は同一モジュール/クラスのテストを同じ
        # ワーカーに固めるため、フィクスチャ IFC の解析キャッシュ (conftest の
        # load_fixture_ifc / 各ワーカー内で共有) の再利用が最大化される。
        # pytest-cov はワーカー間のカバレッジを自動で結合する。
        # --cov-report=xml が Cobertura 形式の coverage.xml を出力する
        # (GitHub Code Quality のカバレッジ機能が要求する形式)。
        # --cov-report=term-missing で未カバー行をログにも出す。
        run: >-
          pytest tests/ -n auto --dist loadscope
          --cov=src/vectorworks_plugin_import_ifc_homeskz
          --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report artifact
        # カバレッジは matrix のうち 1 バージョン分だけを後続ジョブへ受け渡す
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
          retention-days: 1

  upload-coverage:
    # GitHub ネイティブのカバレッジ機能 (GitHub Code Quality) へ Cobertura XML を
    # アップロードする。これにより PR 上でカバレッジが表示され、リポジトリの
    # ルールセット (Code coverage merge protection) で「一定カバレッジ未満は
    # マージ不可」といったネイティブな制限を有効化できる。
    needs: test
    runs-on: ubuntu-latest
    # コード品質のカバレッジ API への書き込みに必要な最小権限のみを付与する
    permissions:
      contents: read
      code-quality: write
    # カバレッジ機能は PR ブランチと既定ブランチの値を比較するため、
    # 既定ブランチへの push (ベースライン確立) と PR でのみ実行する。
    # fork からの PR は書き込みトークンを持てないためスキップする。
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository ||
      (github.event_name == 'push' &&
       github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    steps:
      - name: Download coverage report artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: coverage-xml

      - name: Upload coverage to GitHub Code Quality
        uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1.3.0
        with:
          file: coverage.xml
          language: Python
          label: code-coverage/pytest
          # アップロード失敗を CI エラーではなく警告として扱う。
          # GitHub Code Quality がリポジトリで未有効の間はカバレッジ API が
          # HTTP 404 を返すため、レポート処理で CI を落とさない
          # (マージ制限自体はサーバー側のルールセットが担うため、この
          #  アップロードステップの成否をマージのゲートにはしない)。
          # Code Quality を有効化すればアップロードが成功し PR に反映される。
          fail-on-error: false
